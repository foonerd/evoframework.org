<!doctype html>
<html lang="{{ lang | default(value=config.default_language) }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#00d4aa">
  <link rel="stylesheet" href="{{ get_url(path='css/tokens.css') }}">
  <link rel="stylesheet" href="{{ get_url(path='css/site.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body class="theme-evo-default">
  <header class="site-header">
    <a class="site-brand" href="{{ get_url(path='/') }}">evo<sup class="site-brand-tm">TM</sup></a>
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ get_url(path='/concept/') }}">Concept</a>
      <a href="{{ get_url(path='/build/') }}">Build</a>
      <a href="{{ get_url(path='/distributions/') }}">Distributions</a>
      <a href="{{ get_url(path='/docs/') }}">Docs</a>
      <a href="{{ get_url(path='/project/') }}">Project</a>
    </nav>
    <a class="site-source" href="{{ config.extra.github_repo }}" rel="noopener">Source</a>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>
      evo and evoframework are trademarks of {{ config.extra.project_owner }}.
      See <a href="/project/#trademark">trademark policy</a>.
    </p>
    <p>
      Source under Apache 2.0 at
      <a href="{{ config.extra.github_repo }}" rel="noopener">github.com/foonerd/evoframework.org</a>.
    </p>
  </footer>
</body>
</html>
